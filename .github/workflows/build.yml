name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Accept Android SDK licenses and install required components
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;29.0.14033849"

      - name: Generate CI release keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/upload-keystore.jks \
            -storepass android \
            -alias upload \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=CI, OU=CI, O=Flayr, L=NA, S=NA, C=US"
          printf "storePassword=android\nkeyPassword=android\nkeyAlias=upload\nstoreFile=../upload-keystore.jks\n" > android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
