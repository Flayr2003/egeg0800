name: Build & Release APK

on:
  push:
    branches: [ master, main, Flayr ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Accept Android SDK licenses and install NDK
      - name: Accept Android SDK Licenses & Install NDK
        run: |
          ANDROID_SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          SDKMANAGER="$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "ndk;29.0.14033849" || true

      # 5. google-services.json: use secret if provided, otherwise keep committed file
      - name: Restore google-services.json (if secret exists)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "google-services.json restored from secret"
          else
            echo "Using committed android/app/google-services.json"
          fi
          ls -l android/app/google-services.json

      # 6. Keystore: use secrets if provided, otherwise use committed upload-keystore.jks
      - name: Prepare signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/flayr_release.jks
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "storeFile=flayr_release.jks"
            } > android/key.properties
            echo "Release keystore restored from secrets"
          else
            echo "Using committed upload-keystore.jks + key.properties"
          fi

      # 7. Git config for GitLab dependencies
      - name: Configure Git for GitLab dependencies
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://".insteadOf "git://"

      # 8. Dependencies
      - name: Get dependencies
        run: flutter pub get
        timeout-minutes: 10

      # 9. Build signed release APK
      - name: Build Signed Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # 10. Extract SHA-1 from APK for Firebase Console
      - name: Extract SHA-1 from APK
        run: |
          echo "### 🔐 SHA-1 Certificate Fingerprint" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          keytool -printcert -jarfile build/app/outputs/flutter-apk/app-release.apk | grep "SHA1:" >> $GITHUB_STEP_SUMMARY || echo "Could not extract SHA1" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Add this SHA-1 to Firebase Console → Project Settings → Your apps → Android → Add fingerprint, then re-download google-services.json and update GitHub secret GOOGLE_SERVICES_JSON." >> $GITHUB_STEP_SUMMARY

      # 11. Release metadata
      - name: Prepare release info
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          BUILD_NUM=${{ github.run_number }}
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG="v${VERSION}-build${BUILD_NUM}"
          FILENAME="Flayr-${VERSION}-build${BUILD_NUM}.apk"
          APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)

          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "tag=$TAG"             >> $GITHUB_OUTPUT
          echo "filename=$FILENAME"   >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE"   >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          cp build/app/outputs/flutter-apk/app-release.apk "${FILENAME}"

      # 12. Upload APK artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flayr-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      # 13. Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Flayr ${{ steps.version.outputs.version }} (Build #${{ github.run_number }})"
          body: |
            ## 📱 Flayr — Build #${{ github.run_number }}

            | | |
            |---|---|
            | **Version** | `${{ steps.version.outputs.version }}` |
            | **Commit** | `${{ steps.version.outputs.short_sha }}` |
            | **APK Size** | ${{ steps.version.outputs.apk_size }} |

            **Commit message:** ${{ github.event.head_commit.message }}

            ---

            ### ⬇️ Download & Install
            1. Download **`${{ steps.version.outputs.filename }}`** below.
            2. On your Android device: Settings → Security → Install unknown apps → allow your browser / file manager.
            3. Open the downloaded APK and tap Install.
          files: ${{ steps.version.outputs.filename }}
          draft: false
          prerelease: false
