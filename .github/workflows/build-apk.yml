name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
        cache: true
        
    - name: Configure Git for dependencies
      run: |
        git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
        git config --global url."https://".insteadOf "git://"
        
    - name: Flutter Doctor
      run: flutter doctor -v
      
    - name: Clean previous builds
      run: flutter clean
      
    - name: Get dependencies (with retries)
      run: |
        for i in {1..3}; do
          flutter pub get && break || {
            echo "Attempt $i failed, retrying..."
            sleep 5
          }
        done
      timeout-minutes: 10
      
    - name: Verify dependencies
      run: flutter pub get --offline || flutter pub get
      
    - name: Build APK (unsigned)
      run: |
        flutter build apk --release --no-shrink || \
        flutter build apk --debug
      continue-on-error: false
      
    - name: List APK files
      run: |
        find build/app/outputs -name "*.apk" -type f
        ls -lh build/app/outputs/flutter-apk/ || true
        
    - name: Upload Release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: flayr-release-apk
        path: |
          build/app/outputs/flutter-apk/app-release.apk
          build/app/outputs/flutter-apk/app-debug.apk
        if-no-files-found: warn
        retention-days: 30
        
    - name: Build Summary
      if: always()
      run: |
        echo "### 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
        if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
          echo "**✅ Release APK:** $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
        elif [ -f "build/app/outputs/flutter-apk/app-debug.apk" ]; then
          echo "**⚠️ Debug APK:** $(du -h build/app/outputs/flutter-apk/app-debug.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
        else
          echo "**❌ No APK generated**" >> $GITHUB_STEP_SUMMARY
        fi
