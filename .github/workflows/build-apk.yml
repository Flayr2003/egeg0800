name: Build & Release APK

on:
  push:
    branches: [ master, main, Flayr ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ─── Accept Android SDK Licenses & Install NDK ───────────────
      - name: Accept Android SDK Licenses & Install NDK
        run: |
          ANDROID_SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          SDKMANAGER="$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "ndk;29.0.14033849" || true

      - name: Configure Git for GitLab dependencies
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://".insteadOf "git://"

      - name: Get dependencies
        run: flutter pub get
        timeout-minutes: 10

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Prepare release info
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          BUILD_NUM=${{ github.run_number }}
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG="v${VERSION}-build${BUILD_NUM}"
          FILENAME="Flayr-${VERSION}-build${BUILD_NUM}.apk"
          APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)

          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "tag=$TAG"             >> $GITHUB_OUTPUT
          echo "filename=$FILENAME"   >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE"   >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          cp build/app/outputs/flutter-apk/app-release.apk "${FILENAME}"

          echo "### ✅ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | $VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | #$BUILD_NUM |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | $SHORT_SHA |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK Size** | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flayr-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Flayr ${{ steps.version.outputs.version }} (Build #${{ github.run_number }})"
          body: |
            ## 📱 Flayr — Build #${{ github.run_number }}

            | | |
            |---|---|
            | **Version** | `${{ steps.version.outputs.version }}` |
            | **Commit** | `${{ steps.version.outputs.short_sha }}` |
            | **APK Size** | ${{ steps.version.outputs.apk_size }} |

            **Commit message:** ${{ github.event.head_commit.message }}

            ---

            ### ⬇️ Download & Install
            1. Download **`${{ steps.version.outputs.filename }}`** below.
            2. On your Android device, go to **Settings → Security → Install unknown apps** and allow your browser or file manager.
            3. Open the downloaded APK and tap **Install**.
          files: ${{ steps.version.outputs.filename }}
          draft: false
          prerelease: false
